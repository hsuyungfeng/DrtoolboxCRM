version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: doctor-crm-postgres
    environment:
      POSTGRES_DB: doctor_crm
      POSTGRES_USER: doctor_crm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-doctor_crm_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=doctor_crm
      - DB_PASSWORD=${DB_PASSWORD:-doctor_crm_password}
      - DB_DATABASE=doctor_crm
      - DB_SSL=false
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - VITE_API_BASE_URL=http://backend:3000/api
    depends_on:
      - backend
    networks:
      - crm-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  crm-network:
    driver: bridge
